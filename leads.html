<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juanito — Lead Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }
    .logo-badge {
      background: linear-gradient(135deg, #7b5cff, #4f8dff);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stats-pill {
      background: #252535;
      border: 1px solid #35354a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #a0a0c0;
    }
    .stats-pill span { color: #7b5cff; font-weight: 700; }
    .btn-add {
      background: linear-gradient(135deg, #7b5cff, #4f8dff);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ── Search / filter bar ── */
    .toolbar {
      padding: 16px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-box {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 14px;
      color: #e8e8f0;
      font-size: 14px;
      width: 240px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: #7b5cff; }
    .search-box::placeholder { color: #555570; }
    .filter-select {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e8e8f0;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
    .total-value {
      margin-left: auto;
      font-size: 13px;
      color: #a0a0c0;
    }
    .total-value strong { color: #4caf82; font-size: 15px; }

    /* ── Board ── */
    .board {
      display: flex;
      gap: 16px;
      padding: 0 28px 40px;
      overflow-x: auto;
      align-items: flex-start;
    }
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

    /* ── Column ── */
    .column {
      min-width: 260px;
      max-width: 260px;
      background: #15151f;
      border-radius: 12px;
      border: 1px solid #22223a;
      display: flex;
      flex-direction: column;
    }
    .column-header {
      padding: 14px 16px;
      border-bottom: 1px solid #22223a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .col-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .col-title { font-weight: 600; font-size: 13px; flex: 1; }
    .col-count {
      background: #22223a;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      color: #8080a0;
    }
    .col-value {
      font-size: 11px;
      color: #4caf82;
      font-weight: 600;
    }

    .cards-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 80px;
      flex: 1;
    }
    .cards-list.drag-over { background: #1e1e2e; border-radius: 8px; }

    /* ── Card ── */
    .card {
      background: #1e1e2c;
      border: 1px solid #28283c;
      border-radius: 10px;
      padding: 13px 14px;
      cursor: grab;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative;
    }
    .card:hover { border-color: #7b5cff55; box-shadow: 0 4px 16px #0006; }
    .card.dragging { opacity: 0.45; cursor: grabbing; }

    .card-company { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .card-contact { font-size: 12px; color: #8080a0; margin-bottom: 8px; }
    .card-value {
      font-size: 13px;
      font-weight: 700;
      color: #4caf82;
      margin-bottom: 8px;
    }
    .card-value.no-value { color: #444460; font-weight: 400; }

    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .card-next-action {
      font-size: 11px;
      color: #7070a0;
      border-top: 1px solid #28283c;
      padding-top: 8px;
      margin-top: 4px;
    }
    .card-next-action strong { color: #a0a0c8; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .card-date { font-size: 10px; color: #444460; }
    .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .card:hover .card-actions { opacity: 1; }
    .btn-icon {
      background: #252538;
      border: none;
      border-radius: 5px;
      width: 24px; height: 24px;
      cursor: pointer;
      color: #7070a0;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .btn-icon:hover { background: #7b5cff; color: white; }
    .btn-icon.del:hover { background: #ff4f6a; color: white; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: #0009;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #1a1a26;
      border: 1px solid #2e2e48;
      border-radius: 16px;
      width: 500px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      animation: pop 0.18s ease;
    }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal h2 { font-size: 18px; margin-bottom: 22px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; color: #8080a0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      background: #12121c;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e8e8f0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #7b5cff; }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .form-row select option { background: #1a1a26; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-cancel {
      background: #252535;
      border: 1px solid #35354a;
      border-radius: 8px;
      padding: 9px 18px;
      color: #a0a0c0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #2e2e42; }
    .btn-save {
      background: linear-gradient(135deg, #7b5cff, #4f8dff);
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }

    /* ── Priority colours ── */
    .pri-high   { background: #ff4f6a22; color: #ff7088; }
    .pri-medium { background: #ff9f4a22; color: #ffb86c; }
    .pri-low    { background: #4caf8222; color: #6ecfa0; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 24px 12px;
      color: #404060;
      font-size: 12px;
    }
    .empty-icon { font-size: 24px; margin-bottom: 6px; }

    /* ── Closed won / lost colour overrides ── */
    .column[data-stage="closed-won"] .col-dot { background: #4caf82 !important; }
    .column[data-stage="closed-lost"] .col-dot { background: #ff4f6a !important; }
    .column[data-stage="closed-won"] { border-color: #4caf8233; }
    .column[data-stage="closed-lost"] { border-color: #ff4f6a33; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">Revolut</span>
    Lead Tracker
  </div>
  <div class="header-right">
    <div class="stats-pill">Pipeline: <span id="stat-open">0</span> open · <span id="stat-won">0</span> won</div>
    <button class="btn-add" onclick="openModal()">+ Add Lead</button>
  </div>
</header>

<div class="toolbar">
  <input class="search-box" type="text" id="search" placeholder="Search company, contact…" oninput="render()">
  <select class="filter-select" id="filter-priority" onchange="render()">
    <option value="">All priorities</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <select class="filter-select" id="filter-product" onchange="render()">
    <option value="">All products</option>
    <option value="Business">Business</option>
    <option value="Personal">Personal</option>
    <option value="Spend">Spend</option>
    <option value="Other">Other</option>
  </select>
  <div class="total-value">Total pipeline: <strong id="total-value">€0</strong></div>
</div>

<div class="board" id="board"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <h2 id="modal-title">New Lead</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>Company *</label>
        <input id="f-company" type="text" placeholder="Acme Corp">
      </div>
      <div class="form-row">
        <label>Contact name</label>
        <input id="f-contact" type="text" placeholder="Jane Smith">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Contact email</label>
        <input id="f-email" type="email" placeholder="jane@acme.com">
      </div>
      <div class="form-row">
        <label>Phone</label>
        <input id="f-phone" type="text" placeholder="+44 7…">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Deal value (€)</label>
        <input id="f-value" type="number" placeholder="0">
      </div>
      <div class="form-row">
        <label>Product</label>
        <select id="f-product">
          <option value="Business">Business</option>
          <option value="Personal">Personal</option>
          <option value="Spend">Spend</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Stage</label>
        <select id="f-stage"></select>
      </div>
      <div class="form-row">
        <label>Priority</label>
        <select id="f-priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Next action</label>
      <input id="f-next" type="text" placeholder="e.g. Send proposal by Friday">
    </div>
    <div class="form-row">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any relevant context…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveLead()">Save lead</button>
    </div>
  </div>
</div>

<script>
const STAGES = [
  { id: 'prospecting',  label: 'Prospecting',  color: '#7b5cff' },
  { id: 'contacted',    label: 'Contacted',     color: '#4f8dff' },
  { id: 'qualified',    label: 'Qualified',     color: '#00c4ff' },
  { id: 'demo',         label: 'Demo / Meeting',color: '#ff9f4a' },
  { id: 'proposal',     label: 'Proposal Sent', color: '#ffdb4a' },
  { id: 'negotiation',  label: 'Negotiation',   color: '#ff7b4a' },
  { id: 'closed-won',   label: 'Closed Won',    color: '#4caf82' },
  { id: 'closed-lost',  label: 'Closed Lost',   color: '#ff4f6a' },
];

let leads = JSON.parse(localStorage.getItem('revolut-leads') || '[]');
let editingId = null;
let dragId = null;

function save() { localStorage.setItem('revolut-leads', JSON.stringify(leads)); }

function fmt(v) {
  if (!v) return null;
  return '€' + Number(v).toLocaleString('en-IE');
}

function daysSince(ts) {
  const d = Math.floor((Date.now() - ts) / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  return d + 'd ago';
}

/* ── Build board ── */
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('filter-priority').value;
  const fpr = document.getElementById('filter-product').value;

  const filtered = leads.filter(l => {
    if (q && !l.company.toLowerCase().includes(q) && !(l.contact||'').toLowerCase().includes(q)) return false;
    if (fp && l.priority !== fp) return false;
    if (fpr && l.product !== fpr) return false;
    return true;
  });

  const board = document.getElementById('board');
  board.innerHTML = '';

  let totalOpen = 0, totalWon = 0, totalVal = 0;

  STAGES.forEach(stage => {
    const cards = filtered.filter(l => l.stage === stage.id);
    const stageVal = cards.reduce((s, l) => s + (Number(l.value)||0), 0);

    if (stage.id !== 'closed-lost' && stage.id !== 'closed-won') totalVal += stageVal;
    cards.forEach(l => {
      if (l.stage === 'closed-won') totalWon++;
      else if (l.stage !== 'closed-lost') totalOpen++;
    });

    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.stage = stage.id;
    col.innerHTML = `
      <div class="column-header">
        <div class="col-dot" style="background:${stage.color}"></div>
        <div class="col-title">${stage.label}</div>
        <div class="col-count">${cards.length}</div>
        ${stageVal ? `<div class="col-value">${fmt(stageVal)}</div>` : ''}
      </div>
      <div class="cards-list" data-stage="${stage.id}">
        ${cards.length === 0 ? `<div class="empty"><div class="empty-icon">○</div>No leads</div>` : ''}
        ${cards.map(cardHTML).join('')}
      </div>
    `;
    board.appendChild(col);
  });

  document.getElementById('stat-open').textContent = totalOpen;
  document.getElementById('stat-won').textContent = totalWon;
  document.getElementById('total-value').textContent = fmt(totalVal) || '€0';

  // Drag events
  board.querySelectorAll('.card').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      board.querySelectorAll('.cards-list').forEach(l => l.classList.remove('drag-over'));
    });
  });
  board.querySelectorAll('.cards-list').forEach(list => {
    list.addEventListener('dragover', e => { e.preventDefault(); list.classList.add('drag-over'); });
    list.addEventListener('dragleave', () => list.classList.remove('drag-over'));
    list.addEventListener('drop', e => {
      e.preventDefault();
      list.classList.remove('drag-over');
      const lead = leads.find(l => l.id === dragId);
      if (lead && lead.stage !== list.dataset.stage) {
        lead.stage = list.dataset.stage;
        save(); render();
      }
    });
  });
}

function cardHTML(l) {
  const priLabel = { high: 'High', medium: 'Med', low: 'Low' }[l.priority] || '';
  const valStr = l.value ? `<div class="card-value">${fmt(l.value)}</div>` : `<div class="card-value no-value">No value set</div>`;
  return `
    <div class="card" draggable="true" data-id="${l.id}">
      <div class="card-company">${esc(l.company)}</div>
      <div class="card-contact">${esc(l.contact || '—')}</div>
      ${valStr}
      <div class="card-tags">
        <span class="tag pri-${l.priority}">${priLabel}</span>
        ${l.product ? `<span class="tag" style="background:#7b5cff22;color:#9b8cff">${esc(l.product)}</span>` : ''}
      </div>
      ${l.nextAction ? `<div class="card-next-action"><strong>Next:</strong> ${esc(l.nextAction)}</div>` : ''}
      <div class="card-footer">
        <div class="card-date">${daysSince(l.createdAt)}</div>
        <div class="card-actions">
          <button class="btn-icon" title="Edit" onclick="openModal('${l.id}')">✎</button>
          <button class="btn-icon del" title="Delete" onclick="deleteLead('${l.id}')">✕</button>
        </div>
      </div>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Modal ── */
function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modal-backdrop');
  const stageSelect = document.getElementById('f-stage');
  stageSelect.innerHTML = STAGES.map(s => `<option value="${s.id}">${s.label}</option>`).join('');

  if (id) {
    const l = leads.find(x => x.id === id);
    document.getElementById('modal-title').textContent = 'Edit Lead';
    document.getElementById('f-company').value = l.company;
    document.getElementById('f-contact').value = l.contact || '';
    document.getElementById('f-email').value = l.email || '';
    document.getElementById('f-phone').value = l.phone || '';
    document.getElementById('f-value').value = l.value || '';
    document.getElementById('f-product').value = l.product || 'Business';
    document.getElementById('f-stage').value = l.stage;
    document.getElementById('f-priority').value = l.priority;
    document.getElementById('f-next').value = l.nextAction || '';
    document.getElementById('f-notes').value = l.notes || '';
  } else {
    document.getElementById('modal-title').textContent = 'New Lead';
    document.getElementById('f-company').value = '';
    document.getElementById('f-contact').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-value').value = '';
    document.getElementById('f-product').value = 'Business';
    document.getElementById('f-stage').value = 'prospecting';
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-next').value = '';
    document.getElementById('f-notes').value = '';
  }
  modal.classList.add('open');
  document.getElementById('f-company').focus();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  editingId = null;
}

function backdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

function saveLead() {
  const company = document.getElementById('f-company').value.trim();
  if (!company) { document.getElementById('f-company').focus(); return; }

  const data = {
    company,
    contact:    document.getElementById('f-contact').value.trim(),
    email:      document.getElementById('f-email').value.trim(),
    phone:      document.getElementById('f-phone').value.trim(),
    value:      document.getElementById('f-value').value,
    product:    document.getElementById('f-product').value,
    stage:      document.getElementById('f-stage').value,
    priority:   document.getElementById('f-priority').value,
    nextAction: document.getElementById('f-next').value.trim(),
    notes:      document.getElementById('f-notes').value.trim(),
  };

  if (editingId) {
    const idx = leads.findIndex(l => l.id === editingId);
    leads[idx] = { ...leads[idx], ...data };
  } else {
    leads.push({ id: crypto.randomUUID(), createdAt: Date.now(), ...data });
  }

  save(); closeModal(); render();
}

function deleteLead(id) {
  if (!confirm('Remove this lead?')) return;
  leads = leads.filter(l => l.id !== id);
  save(); render();
}

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
